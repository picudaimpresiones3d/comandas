<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">

<title>Sistema de Comandas</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
padding:20px;
}

button{
padding:12px;
margin:5px;
font-size:16px;
border-radius:8px;
border:none;
background:#2c7be5;
color:white;
}

button:hover{
background:#1a5fd0;
}

.section{
margin-bottom:20px;
}

#lista{
background:white;
padding:10px;
border-radius:10px;
}

</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</head>

<body>

<h1>Sistema de Comandas</h1>

<div class="section">

<h3>Tipo de pedido</h3>

<button onclick="envio()">Para envío</button>
<button onclick="mostrarMesas()">Para aquí</button>

<div id="mesas"></div>

<p id="info"></p>

</div>

<div class="section">

<h3>Para Picar</h3>

<button onclick="pican('Pican 2',750)">Pican 2 $750</button>
<button onclick="pican('Pican 4',940)">Pican 4 $940</button>
<button onclick="pican('Pican 6',1130)">Pican 6 $1130</button>
<button onclick="pican('Pican 8',1290)">Pican 8 $1290</button>

</div>

<div class="section">

<h3>Empanadas</h3>

<button onclick="emp('Carne')">Carne</button>
<button onclick="emp('Jamón')">Jamón</button>
<button onclick="emp('Verdura')">Verdura</button>
<button onclick="emp('Queso')">Queso</button>
<button onclick="emp('Dulce')">Dulces</button>

</div>

<div class="section">

<h3>Salsas</h3>

<button onclick="salsa('Ketchup')">Ketchup</button>
<button onclick="salsa('Mayonesa')">Mayonesa</button>
<button onclick="salsa('BBQ')">BBQ</button>
<button onclick="salsa('Picante')">Picante</button>
<button onclick="salsa('Ajo')">Ajo</button>
<button onclick="salsa('Soja')">Soja</button>
<button onclick="salsa('Cheddar')">Cheddar</button>

</div>

<h2>Pedido</h2>

<div id="lista"></div>

<h2 id="total">$0</h2>

<button onclick="pdf()">Descargar PDF</button>

<script>

let pedido=[]
let total=0
let mesa=""
let tipo=""

function envio(){

tipo="envio"

document.getElementById("info").innerText="Pedido para envío"

}

function mostrarMesas(){

tipo="mesa"

let html=""

for(let i=1;i<=30;i++){

html+=`<button onclick="mesaSel(${i})">${i}</button>`

}

document.getElementById("mesas").innerHTML=html

}

function mesaSel(n){

mesa=n

document.getElementById("info").innerText="Mesa "+n

}

function pican(nombre,precio){

pedido.push(nombre+" $"+precio)

total+=precio

actualizar()

}

function emp(tipo){

let sabor=prompt("Sabor ("+tipo+")")

let cant=parseInt(prompt("Cantidad"))

let precio=100*cant

pedido.push("Empanada "+sabor+" x"+cant+" $"+precio)

total+=precio

actualizar()

}

function salsa(n){

pedido.push("Salsa "+n)

actualizar()

}

function actualizar(){

let html=""

pedido.forEach(p=>{

html+=p+"<br>"

})

document.getElementById("lista").innerHTML=html

document.getElementById("total").innerText="$"+total

}

function pdf(){

const { jsPDF } = window.jspdf

const doc=new jsPDF()

let y=10

if(tipo=="envio"){

doc.text("Pedido para envío",10,y)

}else{

doc.text("Mesa "+mesa,10,y)

}

y+=10

pedido.forEach(p=>{

doc.text(p,10,y)

y+=8

})

y+=10

doc.text("Total $"+total,10,y)

doc.save("comanda.pdf")

}

</script>

</body>
</html>
